repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: python -m pytest
        language: system
        pass_filenames: false
        stages: [manual]

      - id: pyright
        name: pyright
        entry: pyright
        language: system
        pass_filenames: false
        stages: [manual]

      - id: bandit
        name: bandit
        entry: python -m bandit -c pyproject.toml -r .
        language: system
        pass_filenames: false
        stages: [manual]

      - id: pip-audit
        name: pip-audit
        entry: python -m pip_audit -r requirements.txt -r requirements-dev.txt --ignore-vuln GHSA-6w46-j5rx-g56g
        language: system
        pass_filenames: false
        stages: [manual]
