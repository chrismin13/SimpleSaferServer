[tool.ruff]
target-version = "py37"
line-length = 100
extend-exclude = [
  ".dev-data",
  ".venv",
  "third_party",
  "harddrive_model",
]

[tool.ruff.lint]
select = [
  "E",
  "F",
  "I",
  "UP",
  "B",
  "SIM",
  "C4",
  "PIE",
  "RUF",
]
ignore = [
  "E501",
]

[tool.ruff.lint.per-file-ignores]
# Deeply nested patch contexts in tests often read more clearly than wide
# multi-context `with` statements, especially when only one mock is asserted.
"tests/*.py" = ["SIM117"]

[tool.ruff.format]
quote-style = "preserve"
indent-style = "space"
line-ending = "lf"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]

[tool.bandit]
exclude_dirs = [
  ".venv",
  ".dev-data",
  "third_party",
  "tests",
]
skips = [
  "B104",
  "B105",
  "B112",
  "B310",
  # SimpleSaferServer is a local admin tool that intentionally shells out to
  # Debian system utilities. Command allowlisting belongs in adapter refactors.
  "B404",
  "B603",
  "B607",
]
