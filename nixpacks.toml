[variables]
# Railway fake mode stores config, users, secrets, and the persisted Flask
# session key under SSS_DATA_DIR. That path must be backed by a Railway volume
# in production, or every fresh deploy starts from an empty setup state.
SSS_MODE = "fake"
SSS_SKIP_LOGIN = "true"
SSS_DATA_DIR = "/data"

[phases.setup]
nixPkgs = ["python311", "rclone", "msmtp", "smartmontools"]

[phases.install]
cmds = ["python -m venv .venv", ".venv/bin/pip install -r requirements.txt"]

[start]
cmd = ".venv/bin/gunicorn --worker-class eventlet -w 1 --bind 0.0.0.0:$PORT app:app"
