[variables]
SSS_MODE = "fake"
SSS_SKIP_LOGIN = "true"

[phases.setup]
nixPkgs = ["python311", "rclone", "msmtp", "smartmontools"]

[phases.install]
cmds = ["python -m venv .venv", ".venv/bin/pip install -r requirements.txt"]

[start]
cmd = ".venv/bin/gunicorn --worker-class eventlet -w 1 --bind 0.0.0.0:$PORT app:app"
