[build]
# Railway's default builder is Railpack today, but this keeps the deployment
# choice visible when someone audits an old Railway service later.
builder = "RAILPACK"

[deploy]
# The Railway demo runs only the Flask web app in fake mode. Fake-mode settings
# live in Railway service variables so this file does not pretend to be the
# full Debian installer.
startCommand = ".venv/bin/gunicorn --worker-class gthread --threads ${WEB_THREADS:-4} -w 1 --bind 0.0.0.0:$PORT simple_safer_server.wsgi:app"
