<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in — SimpleSaferServer</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Design System -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/design-tokens.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <!-- Custom Login Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
    
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='img/favicon.ico') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/favicon.png') }}">
</head>
<body class="login-body">
    {% include 'partials/app_bg.html' %}

    <div class="login-wrapper">
        <div class="login-feedback-slot">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="login-alert {% if category == 'error' %}login-alert-error{% else %}login-alert-success{% endif %}">
                            <i class="fas {% if category == 'error' %}fa-exclamation-triangle{% else %}fa-check-circle{% endif %}"></i>
                            <span>{{ message }}</span>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
        </div>

        <div class="login-brand-header">
            <div class="login-brand-icon-wrapper">
                <i class="fas fa-shield-halved"></i>
            </div>
            <h1 class="login-brand-title">SimpleSaferServer</h1>
            <p class="login-brand-subtitle">Sign in to manage your server</p>
        </div>

        <div class="login-card">
            <form class="login-form" id="loginForm" action="{{ url_for('login') }}" method="POST">
                <div class="form-group">
                    <label for="username" class="form-label">Username</label>
                    <input id="username" name="username" type="text" required class="form-control" placeholder="Enter your username" autocomplete="username" autofocus>
                </div>
                
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input id="password" name="password" type="password" required class="form-control" placeholder="Enter your password" autocomplete="current-password">
                </div>
                
                <button type="submit" id="loginSubmitBtn" class="btn btn-primary btn-block btn-submit">
                    <i class="fas fa-right-to-bracket me-2"></i> Sign in
                </button>
            </form>
        </div>
    </div>

    <!-- Script for Async Action Button -->
    <script src="{{ url_for('static', filename='js/common.js') }}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('loginForm');
            const submitBtn = document.getElementById('loginSubmitBtn');
            const feedbackSlot = document.querySelector('.login-feedback-slot');

            function showLoginError(message) {
                if (!feedbackSlot) {
                    console.error(message || 'Login failed');
                    return;
                }
                feedbackSlot.textContent = '';
                const alert = document.createElement('div');
                alert.className = 'login-alert login-alert-error';
                const icon = document.createElement('i');
                icon.className = 'fas fa-exclamation-triangle';
                icon.setAttribute('aria-hidden', 'true');
                const text = document.createElement('span');
                text.textContent = message || 'Login failed';
                alert.append(icon, text);
                feedbackSlot.appendChild(alert);
            }
            
            if (form && submitBtn) {
                form.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    window.AsyncButtonState.start(submitBtn, { minPendingVisible: 500 });
                    
                    try {
                        const formData = new FormData(form);
                        const result = await window.ApiClient.fetchJson(form.action, {
                            method: 'POST',
                            body: formData,
                            headers: { 'Accept': 'application/json' }
                        });

                        if (result.data && result.data.redirect) {
                            window.AsyncButtonState.success(submitBtn);
                            window.location.href = result.data.redirect;
                        } else {
                            window.AsyncButtonState.error(submitBtn);
                            showLoginError(result.message || result.detail || 'Login failed');
                            // Clear password field for standard UX
                            const pwField = document.getElementById('password');
                            if (pwField) {
                                pwField.value = '';
                                pwField.focus();
                            }
                        }
                    } catch (err) {
                        window.AsyncButtonState.error(submitBtn);
                        showLoginError(err.message || err.detail || 'Login failed');
                    }
                });
            }
        });
    </script>
</body>
</html>
