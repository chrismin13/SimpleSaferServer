<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in — SimpleSaferServer</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Design System -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/design-tokens.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <!-- Custom Login Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
    
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='img/favicon.ico') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/favicon.png') }}">
</head>
<body class="login-body">
    <!-- Abstract texture & scrolling background animation (Global) -->
    <div class="app-bg-container">
        <div class="app-bg-orbs">
            <div class="orb orb-1"></div>
            <div class="orb orb-2"></div>
        </div>
        <div class="app-bg-grid"></div>
        <div class="app-bg-noise"></div>
    </div>

    <div class="login-wrapper">
        <div class="login-feedback-slot">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="login-alert {% if category == 'error' %}login-alert-error{% else %}login-alert-success{% endif %}">
                            <i class="fas {% if category == 'error' %}fa-exclamation-triangle{% else %}fa-check-circle{% endif %}"></i>
                            <span>{{ message }}</span>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
        </div>

        <div class="login-brand-header">
            <div class="login-brand-icon-wrapper">
                <i class="fas fa-shield-halved"></i>
            </div>
            <h1 class="login-brand-title">SimpleSaferServer</h1>
            <p class="login-brand-subtitle">Sign in to manage your server</p>
        </div>

        <div class="login-card">
            <form class="login-form" id="loginForm" action="{{ url_for('login') }}" method="POST">
                <div class="form-group">
                    <label for="username" class="form-label">Username</label>
                    <input id="username" name="username" type="text" required class="form-control" placeholder="Enter your username" autocomplete="username" autofocus>
                </div>
                
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input id="password" name="password" type="password" required class="form-control" placeholder="Enter your password" autocomplete="current-password">
                </div>
                
                <button type="submit" id="loginSubmitBtn" class="btn btn-primary btn-block btn-submit">
                    <i class="fas fa-right-to-bracket me-2"></i> Sign in
                </button>
            </form>
        </div>
    </div>

    <!-- Script for Async Action Button -->
    <script src="{{ url_for('static', filename='js/common.js') }}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('loginForm');
            const submitBtn = document.getElementById('loginSubmitBtn');
            const feedbackSlot = document.querySelector('.login-feedback-slot');
            
            if (form && submitBtn) {
                form.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    window.AsyncButtonState.start(submitBtn, { minPendingVisible: 500 });
                    
                    try {
                        const formData = new FormData(form);
                        const response = await fetch(form.action, {
                            method: 'POST',
                            body: formData,
                            headers: { 'Accept': 'application/json' }
                        });
                        
                        const data = await response.json();
                        
                        if (data.success) {
                            window.AsyncButtonState.success(submitBtn);
                            window.location.href = data.redirect;
                        } else {
                            window.AsyncButtonState.error(submitBtn);
                            feedbackSlot.innerHTML = `
                                <div class="login-alert login-alert-error">
                                    <i class="fas fa-exclamation-triangle"></i>
                                    <span>${data.message || 'Login failed'}</span>
                                </div>
                            `;
                            // Clear password field for standard UX
                            const pwField = document.getElementById('password');
                            if (pwField) {
                                pwField.value = '';
                                pwField.focus();
                            }
                        }
                    } catch (err) {
                        window.AsyncButtonState.error(submitBtn);
                        feedbackSlot.innerHTML = `
                            <div class="login-alert login-alert-error">
                                <i class="fas fa-exclamation-triangle"></i>
                                <span>Network error. Please try again.</span>
                            </div>
                        `;
                    }
                });
            }
        });
    </script>
</body>
</html>
