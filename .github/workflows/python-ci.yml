name: Python CI

permissions:
  contents: read

on:
  pull_request:
  push:
    branches: [main]

jobs:
  python-ci:
    name: Python CI (uv / Python 3.14)
    runs-on: ubuntu-latest
    container: ghcr.io/astral-sh/uv:python3.14-trixie

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Run source checks
        run: bash check_ci.sh --check-format

      - name: Run security checks
        run: bash check_security.sh --no-sync
