name: Quality

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    container: python:3.7-buster

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          python -m pip install --upgrade "pip<24.1" wheel
          python -m pip install -r requirements.txt -r requirements-dev.txt

      # These gates are advisory while the existing codebase is moved toward
      # the standard in docs/development.md. Remove continue-on-error one gate
      # at a time after the related legacy debt has been cleaned up.
      - name: Check formatting
        continue-on-error: true
        run: python -m ruff format --check .

      - name: Lint
        continue-on-error: true
        run: python -m ruff check .

      - name: Test
        continue-on-error: true
        run: python -m pytest

      - name: Type check
        continue-on-error: true
        run: pyright

      - name: Security scan
        continue-on-error: true
        run: python -m bandit -c pyproject.toml -r .

      - name: Dependency audit
        continue-on-error: true
        run: python -m pip_audit -r requirements.txt -r requirements-dev.txt --ignore-vuln GHSA-6w46-j5rx-g56g
