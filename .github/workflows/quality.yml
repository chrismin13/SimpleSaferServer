name: Quality

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    container: python:3.7-buster

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          python -m pip install --upgrade "pip<24.1" wheel
          python -m pip install -r requirements.txt -r requirements-dev.txt

      # Keep every gate strict so refactors do not quietly drift away from
      # the repository standard in docs/development.md.
      - name: Check formatting
        run: python -m ruff format --check .

      - name: Lint
        run: python -m ruff check .

      - name: Test
        run: python -m pytest

      - name: Type check
        run: pyright

      - name: Security scan
        run: python -m bandit -c pyproject.toml -r .

      - name: Dependency audit
        run: python -m pip_audit -r requirements.txt -r requirements-dev.txt --ignore-vuln GHSA-6w46-j5rx-g56g
